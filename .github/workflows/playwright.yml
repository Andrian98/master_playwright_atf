name: Playwright Regression Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # 💡 Allows you to trigger the tests manually from the GitHub web UI

jobs:
  test:
    timeout-minutes: 30
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm' # 💡 Automatically caches your node_modules for faster subsequent runs

      - name: Install dependencies
        run: npm ci # 💡 Forces clean installation matching package-lock.json exactly

      - name: Install Playwright Browsers & OS Dependencies
        run: npx playwright install --with-deps chromium

      - name: Clean environment directories
        run: npm run clean

      - name: Run Playwright Tests (CI Mode)
        run: npm run test:ci

      - name: Upload Test Automation Artifacts
        uses: actions/upload-artifact@v4
        if: always() # 💡 CRITICAL: Runs even if your tests fail so you don't lose validation logs
        with:
          name: playwright-execution-evidence
          path: |
            playwright-report/
            test-results/
            evidence/
          retention-days: 30 # 💡 Adjust retention as needed to manage storage and access to historical test data